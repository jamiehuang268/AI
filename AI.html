<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI项目列表</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; background: #f5f5f5; }
        .header { background: #4a90d9; color: #fff; padding: 20px; text-align: center; font-size: 22px; }
        .loading { text-align: center; padding: 60px; color: #888; font-size: 16px; }
        .list { max-width: 600px; margin: 30px auto; }
        .item { background: #fff; margin: 12px 0; padding: 18px 24px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,.08); cursor: pointer; font-size: 17px; transition: .2s; display: flex; align-items: center; gap: 12px; }
        .item:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,.15); }
        .item::before { content: "📄"; font-size: 22px; }
        .error { text-align: center; padding: 40px 20px; color: #e74c3c; font-size: 15px; line-height: 1.8; }
        .error pre { background: #fff3f3; padding: 15px; border-radius: 8px; margin-top: 15px; text-align: left; font-size: 12px; overflow-x: auto; white-space: pre-wrap; word-break: break-all; }
        .back-btn { position: fixed; top: 10px; left: 10px; background: rgba(0,0,0,.6); color: #fff; border: none; padding: 8px 18px; border-radius: 6px; cursor: pointer; font-size: 14px; z-index: 99999; display: none; }
        .back-btn:hover { background: rgba(0,0,0,.8); }
        .status { text-align: center; padding: 10px; color: #999; font-size: 12px; }
        .retry-btn { display: inline-block; margin-top: 15px; padding: 10px 30px; background: #4a90d9; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 15px; }
        .retry-btn:hover { background: #357abd; }
    </style>
</head>
<body>
    <button class="back-btn" id="backBtn" onclick="goBack()">← 返回列表</button>
    <div id="app">
        <div class="header">🤖 AI 项目列表</div>
        <div class="loading" id="loading">
            <div style="font-size:36px;margin-bottom:15px">⏳</div>
            正在从金山文档获取数据...<br>
            <span class="status" id="status"></span>
        </div>
        <div class="list" id="list"></div>
        <div class="error" id="error" style="display:none"></div>
    </div>

    <script>
        // ========== 配置 ==========
        const WPS_HOST = "https://www.kdocs.cn";
        const WPS_TOKEN = "2hoG7YUtulWlqPDaxn6Mm9";
        const WPS_API = "/api/v3/ide/file/cs8hw42t5wQH/script/V2-6NZQqpzLrxjZCALOBus1an/sync_task";
        const TARGET_URL = WPS_HOST + WPS_API;

        // 多个CORS代理，依次尝试
        const CORS_PROXIES = [
            { name: "corsproxy.io",      url: "https://corsproxy.io/?" + encodeURIComponent(TARGET_URL) },
            { name: "allorigins(GET)",    url: null, special: "allorigins" },
            { name: "cors-anywhere",      url: "https://cors-anywhere.herokuapp.com/" + TARGET_URL },
            { name: "直连(无代理)",        url: TARGET_URL },
        ];

        let projects = [];
        let originalHTML = "";

        // ========== 主函数 ==========
        async function fetchData() {
            document.getElementById("loading").style.display = "block";
            document.getElementById("error").style.display = "none";
            document.getElementById("list").innerHTML = "";

            const body = JSON.stringify({ Context: { argv: {} } });
            const headers = {
                "Content-Type": "application/json",
                "AirScript-Token": WPS_TOKEN
            };

            let lastError = "";

            for (let i = 0; i < CORS_PROXIES.length; i++) {
                const proxy = CORS_PROXIES[i];
                setStatus(`尝试第 ${i + 1}/${CORS_PROXIES.length} 个通道: ${proxy.name} ...`);
                console.log(`[尝试] ${proxy.name}`);

                try {
                    let data;

                    if (proxy.special === "allorigins") {
                        // allorigins 方案：先用它做 GET 代理不太合适POST，跳过或用备用
                        // 这里改用 api.allorigins.win 的 raw 模式（仅支持GET，对POST场景跳过）
                        throw new Error("allorigins不支持POST，跳过");
                    }

                    const res = await fetch(proxy.url, {
                        method: "POST",
                        headers: headers,
                        body: body,
                        // 对代理可能需要去掉部分限制
                    });

                    if (!res.ok) {
                        throw new Error(`HTTP ${res.status} ${res.statusText}`);
                    }

                    data = await res.json();
                    console.log(`[${proxy.name}] 响应:`, data);

                    // ========== 解析返回数据 ==========
                    let rsp = data;

                    // 金山AirScript典型结构: { data: { result: "json字符串" } } 或其他变体
                    if (data.result && typeof data.result === "object") {
                        rsp = data.result;
                    }
                    if (rsp.rsp) {
                        rsp = typeof rsp.rsp === "string" ? JSON.parse(rsp.rsp) : rsp.rsp;
                    }
                    if (typeof data.data === "string") {
                        try { rsp = JSON.parse(data.data); } catch(e) {}
                    } else if (data.data && data.data.records) {
                        rsp = data.data;
                    }
                    if (data.records) {
                        rsp = data;
                    }

                    const records = rsp.records || [];

                    if (!records.length) {
                        // 拿到响应但没解析出records，可能结构不对，记录后继续
                        lastError = `${proxy.name} 返回成功但未解析到records。响应: ${JSON.stringify(data).substring(0, 800)}`;
                        console.warn(lastError);
                        // 不继续尝试下一个代理了，因为API本身是通的
                        // 直接显示调试信息
                        showError(`请求成功但未解析到项目数据。<br>请打开浏览器控制台(F12)查看完整响应。<pre>${escapeHtml(JSON.stringify(data, null, 2).substring(0, 2000))}</pre>`);
                        return;
                    }

                    // ========== 成功，提取项目 ==========
                    projects = [];
                    records.forEach(rec => {
                        const fields = rec.fields || {};
                        const name = fields["项目名字"] || "未命名项目";
                        let htmlCode = "";
                        const h = fields["html代码"];

                        if (typeof h === "string") {
                            htmlCode = h;
                        } else if (h && typeof h === "object") {
                            // summary 是截断的预览，可能不完整
                            if (h.content) htmlCode = h.content;
                            else if (h.summary) htmlCode = h.summary;
                        }

                        // 也检查附件
                        const attachments = fields["附件"] || [];

                        projects.push({ name, htmlCode, attachments, id: rec.id });
                    });

                    document.getElementById("loading").style.display = "none";
                    renderList();
                    console.log(`[成功] 通过 ${proxy.name} 获取到 ${projects.length} 个项目`);
                    return; // 成功就退出

                } catch (e) {
                    lastError = `${proxy.name}: ${e.message}`;
                    console.warn(`[失败] ${lastError}`);
                    continue; // 尝试下一个代理
                }
            }

            // 所有代理都失败
            document.getElementById("loading").style.display = "none";
            showError(`
                所有通道均失败，无法获取数据。<br><br>
                <b>原因：</b>浏览器有跨域(CORS)安全限制，本地HTML文件无法直接请求金山文档API。<br><br>
                <b>解决方案（任选一种）：</b><br>
                ① 用 Python 起一个本地代理服务器（推荐，见下方说明）<br>
                ② 安装浏览器插件 "CORS Unblock" 临时关闭CORS<br>
                ③ 用命令行启动Chrome关闭安全策略：<br>
                <code style="background:#eee;padding:2px 6px;font-size:12px">chrome.exe --disable-web-security --user-data-dir=C:\\temp</code><br><br>
                <pre>最后错误: ${escapeHtml(lastError)}</pre>
                <button class="retry-btn" onclick="fetchData()">🔄 重试</button>
                <br><br>
                <button class="retry-btn" style="background:#27ae60" onclick="startLocalMode()">📡 启动本地代理模式</button>
            `);
        }

        // ========== 本地代理模式 ==========
        function startLocalMode() {
            showError(`
                <div style="text-align:left;max-width:550px;margin:0 auto;line-height:2">
                <h3 style="color:#333;margin-bottom:10px">📡 本地代理方案（最可靠）</h3>
                <p>1. 新建文件 <b>proxy_server.py</b>，粘贴以下代码：</p>
                <pre style="font-size:11px;line-height:1.5">
from http.server import HTTPServer, BaseHTTPRequestHandler
import json, urllib.request, ssl

class ProxyHandler(BaseHTTPRequestHandler):
    def do_OPTIONS(self):
        self.send_response(200)
        self._cors()
        self.end_headers()

    def do_POST(self):
        length = int(self.headers.get("Content-Length", 0))
        body = self.rfile.read(length)
        
        url = "https://www.kdocs.cn/api/v3/ide/file/cs8hw42t5wQH/script/V2-6NZQqpzLrxjZCALOBus1an/sync_task"
        req = urllib.request.Request(url, data=body, method="POST")
        req.add_header("Content-Type", "application/json")
        req.add_header("AirScript-Token", "2hoG7YUtulWlqPDaxn6Mm9")
        
        ctx = ssl.create_default_context()
        with urllib.request.urlopen(req, context=ctx) as resp:
            result = resp.read()
        
        self.send_response(200)
        self._cors()
        self.send_header("Content-Type", "application/json")
        self.end_headers()
        self.wfile.write(result)

    def _cors(self):
        self.send_header("Access-Control-Allow-Origin", "*")
        self.send_header("Access-Control-Allow-Methods", "POST, OPTIONS")
        self.send_header("Access-Control-Allow-Headers", "*")

print("代理服务器运行在 http://localhost:8888")
HTTPServer(("", 8888), ProxyHandler).serve_forever()
                </pre>
                <p>2. 运行: <code>python proxy_server.py</code></p>
                <p>3. 点击下方按钮通过本地代理获取数据：</p>
                <button class="retry-btn" onclick="fetchViaLocalProxy()">🚀 通过本地代理获取</button>
                </div>
            `);
        }

        async function fetchViaLocalProxy() {
            setStatus("正在连接本地代理 localhost:8888 ...");
            document.getElementById("error").style.display = "none";
            document.getElementById("loading").style.display = "block";

            try {
                const res = await fetch("http://localhost:8888", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ Context: { argv: {} } })
                });
                const data = await res.json();
                console.log("本地代理响应:", data);

                // 复用解析逻辑
                let rsp = data;
                if (data.result && typeof data.result === "object") rsp = data.result;
                if (rsp.rsp) rsp = typeof rsp.rsp === "string" ? JSON.parse(rsp.rsp) : rsp.rsp;
                if (data.data && typeof data.data === "object" && data.data.records) rsp = data.data;
                if (data.records) rsp = data;

                const records = rsp.records || [];
                if (!records.length) {
                    showError(`代理返回成功但无records<pre>${escapeHtml(JSON.stringify(data,null,2).substring(0,1500))}</pre><button class="retry-btn" onclick="fetchViaLocalProxy()">重试</button>`);
                    return;
                }

                projects = [];
                records.forEach(rec => {
                    const fields = rec.fields || {};
                    const name = fields["项目名字"] || "未命名";
                    let htmlCode = "";
                    const h = fields["html代码"];
                    if (typeof h === "string") htmlCode = h;
                    else if (h && h.content) htmlCode = h.content;
                    else if (h && h.summary) htmlCode = h.summary;
                    projects.push({ name, htmlCode, id: rec.id });
                });

                document.getElementById("loading").style.display = "none";
                renderList();

            } catch (e) {
                document.getElementById("loading").style.display = "none";
                showError(`连接本地代理失败: ${e.message}<br><br>请确认已运行 <code>python proxy_server.py</code><button class="retry-btn" onclick="fetchViaLocalProxy()">重试</button>`);
            }
        }

        // ========== 渲染列表 ==========
        function renderList() {
            const list = document.getElementById("list");
            list.innerHTML = "";
            if (!projects.length) {
                list.innerHTML = '<div style="text-align:center;padding:40px;color:#999">暂无项目</div>';
                return;
            }
            projects.forEach((p, i) => {
                const div = document.createElement("div");
                div.className = "item";
                div.textContent = p.name;
                if (!p.htmlCode) {
                    div.innerHTML += ' <span style="color:#ccc;font-size:12px">(无HTML内容)</span>';
                }
                div.onclick = () => openProject(i);
                list.appendChild(div);
            });
        }

        // ========== 打开项目 ==========
        function openProject(index) {
            const p = projects[index];
            if (!p.htmlCode) {
                alert("该项目没有HTML代码内容（金山文档中"html代码"字段的summary可能被截断）");
                return;
            }
            // 保存当前页面
            originalHTML = document.documentElement.outerHTML;
            // 用 iframe 方式展示，更安全
            document.getElementById("app").innerHTML = `
                <iframe id="projectFrame" srcdoc="${escapeAttr(p.htmlCode)}" 
                    style="width:100%;height:100vh;border:none;display:block"></iframe>
            `;
            document.getElementById("backBtn").style.display = "block";
        }

        function goBack() {
            document.getElementById("backBtn").style.display = "none";
            document.getElementById("app").innerHTML = `
                <div class="header">🤖 AI 项目列表</div>
                <div class="list" id="list"></div>
            `;
            renderList();
        }

        // ========== 工具函数 ==========
        function setStatus(msg) {
            const el = document.getElementById("status");
            if (el) el.textContent = msg;
        }

        function showError(html) {
            document.getElementById("loading").style.display = "none";
            const el = document.getElementById("error");
            el.style.display = "block";
            el.innerHTML = html;
        }

        function escapeHtml(str) {
            return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
        }

        function escapeAttr(str) {
            return str.replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
        }

        // ========== 启动 ==========
        fetchData();
    </script>
</body>
</html>
