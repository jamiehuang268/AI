<title>中考英语背单词</title>
<style>
body{text-align:center;margin-top:40px;font-size:20px; font-family: sans-serif;padding-bottom:100px;}
#word{font-size:48px;margin:20px 0;font-weight:bold;color:#333;}
#mean{font-size:28px;color:#666;margin-bottom:20px;}
.button-row{display:flex;justify-content:center;gap:15px;margin:15px 0;flex-wrap:wrap;}
button{font-size:20px;padding:15px 30px;margin:5px; touch-action: manipulation;border:none;border-radius:8px;cursor:pointer;min-width:120px;}
button:active{transform:scale(0.95);}
.btn-play{background:#2196F3;color:white;}
.btn-unfamiliar{background:#FF9800;color:white;}
.btn-familiar{background:#4CAF50;color:white;}
.btn-next{background:#9C27B0;color:white;}
#status{font-size:14px;color:#666;margin-top:15px;height:20px;}
#progress{font-size:16px;color:#888;margin-top:10px;}
.filter-container{position:fixed;bottom:20px;left:20px;z-index:100;background:rgba(255,255,255,0.95);padding:8px;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,0.15);}
select{font-size:18px;padding:8px 12px;border-radius:6px;border:1px solid #ccc;background:white;}
</style>
</head>
<body>
<div id="word">Loading...</div>
<div id="mean">请稍候</div>
<div id="progress"></div>

<div class="button-row">
  <button class="btn-play" onclick="play()">🔊 发音</button>
  <button class="btn-unfamiliar" onclick="markUnfamiliar()">✗ 不熟悉</button>
</div>
<div class="button-row">
  <button class="btn-familiar" onclick="markFamiliar()">✓ 熟悉</button>
  <button class="btn-next" onclick="next()">➡ 下一个</button>
</div>

<div id="status"></div>

<div class="filter-container">
  <select id="filterSelect" onchange="changeFilter(this.value)">

  {en:"warm",cn:"温暖的，暖和的"},{en:"warn",cn:"警告，告诫"},{en:"wash",cn:"洗，洗涤"},{en:"waste",cn:"浪费，废物"},{en:"watch",cn:"观看，手表"},
  {en:"water",cn:"水"},{en:"wave",cn:"波浪，挥手"},{en:"way",cn:"道路，方法"},{en:"weak",cn:"虚弱的，差的"},{en:"wealth",cn:"财富，财产"},
  {en:"wear",cn:"穿，戴，磨损"},{en:"weather",cn:"天气"},{en:"website",cn:"网站"},{en:"week",cn:"星期，周"},{en:"weekend",cn:"周末"},
  // X,Y,Z (8)
  {en:"X-ray",cn:"X光，X射线"},{en:"yard",cn:"院子，场地"},{en:"year",cn:"年，年份"},{en:"yellow",cn:"黄色的"},{en:"yes",cn:"是，是的"},
  {en:"yesterday",cn:"昨天"},{en:"yet",cn:"还，仍然"},{en:"young",cn:"年轻的"}
];

// ==================== 存储管理 ====================
const KEYS = {
  FAMILIAR: 'familiarWords_v2',   // 真正掌握（点击2次熟悉）
  COUNT: 'familiarCount',         // 熟悉点击次数 {word: count}
  UNFAMILIAR: 'unfamiliarWords',  // 标记不熟悉的
  FILTER: 'currentFilter'         // 当前筛选模式
};

let words = [];
let currentIndex = 0;
let voices = [];

// 兼容旧版本数据迁移
function migrateOldData() {
  const old = localStorage.getItem('familiarWords');
  const current = localStorage.getItem(KEYS.FAMILIAR);
  if (old && !current) {
    try {
      localStorage.setItem(KEYS.FAMILIAR, old);
    } catch(e){}
  }
}

function getFamiliarWords() {
  const s = localStorage.getItem(KEYS.FAMILIAR);
  return s ? JSON.parse(s) : [];
}
function saveFamiliarWords(arr) {
  localStorage.setItem(KEYS.FAMILIAR, JSON.stringify(arr));
}
function getFamiliarCount() {
  const s = localStorage.getItem(KEYS.COUNT);
  return s ? JSON.parse(s) : {};
}
function saveFamiliarCount(obj) {
  localStorage.setItem(KEYS.COUNT, JSON.stringify(obj));
}
function getUnfamiliarWords() {
  const s = localStorage.getItem(KEYS.UNFAMILIAR);
  return s ? JSON.parse(s) : [];
}
function saveUnfamiliarWords(arr) {
  localStorage.setItem(KEYS.UNFAMILIAR, JSON.stringify(arr));
}
function getCurrentFilter() {
  return localStorage.getItem(KEYS.FILTER) || 'unlearned';
}
function saveCurrentFilter(f) {
  localStorage.setItem(KEYS.FILTER, f);
}

// ==================== 语音加载 ====================
function loadVoices(){
  voices = window.speechSynthesis.getVoices();
}
loadVoices();
if (speechSynthesis.onvoiceschanged !== undefined){
  speechSynthesis.onvoiceschanged = loadVoices;
}

// ==================== 核心逻辑 ====================
function initWords() {
  const filter = getCurrentFilter();
  const familiarList = getFamiliarWords();
  const unfamiliarList = getUnfamiliarWords();
  
  // 根据筛选生成列表
  switch(filter) {
    case 'all':
      words = [...allWords];
      break;
    case 'familiar':
      words = allWords.filter(w => familiarList.includes(w.en));
      break;
    case 'unfamiliar':
      words = allWords.filter(w => unfamiliarList.includes(w.en));
      break;
    case 'unlearned':
    default:
      words = allWords.filter(w => !familiarList.includes(w.en));
      break;
  }
  
  if (words.length === 0) {
    showEmptyState(filter);
    return false;
  }
  
  words.sort(() => Math.random() - 0.5);
  currentIndex = 0;
  return true;
}

function showEmptyState(filter) {
  const map = {
    unlearned: ["🎉 恭喜！", "所有单词都已掌握！", "点击不熟悉按钮可重置全部进度"],
    familiar: ["📭 无数据", "还没有标记为熟悉的单词", "去未学习列表积累吧"],
    unfamiliar: ["📭 无数据", "没有标记为不熟悉的单词", "学习时点击不熟悉即可收录"],
    all: ["📭 无数据", "单词库为空", ""]
  };
  const t = map[filter] || map.all;
  document.getElementById("word").innerText = t[0];
  document.getElementById("mean").innerText = t[1];
  document.getElementById("status").innerText = t[2];
  document.getElementById("progress").innerText = "";
}

function show() {
  if (words.length === 0) return;
  const w = words[currentIndex];
  document.getElementById("word").innerText = w.en;
  document.getElementById("mean").innerText = w.cn;
  document.getElementById("status").innerText = "";
  updateProgress();
  setTimeout(() => play(), 300);
}

function updateProgress() {
  const familiar = getFamiliarWords().length;
  const unfamiliar = getUnfamiliarWords().length;
  const total = allWords.length;
  const f = getCurrentFilter();
  let text = "";
  
  if (f === 'unlearned') {
    text = `已掌握 ${familiar}/${total} | 剩余 ${words.length} 个`;
  } else if (f === 'all') {
    text = `总计 ${total} | 已掌握 ${familiar} | 不熟 ${unfamiliar}`;
  } else if (f === 'familiar') {
    text = `已掌握 ${words.length} 个`;
  } else if (f === 'unfamiliar') {
    text = `标记不熟 ${words.length} 个`;
  }
  document.getElementById("progress").innerText = text;
}

// ==================== 发音（有道在线 + 本地后备） ====================
function play() {
  if (words.length === 0) return;
  const word = words[currentIndex].en;
  document.getElementById("status").innerText = "🔊 加载发音...";
  tryOnlineTTS(word, 2); // 2=美式，1=英式
}

function tryOnlineTTS(word, type) {
  const audio = new Audio();
  // 有道词典开放语音接口（标准真人发音）
  audio.src = `https://dict.youdao.com/dictvoice?audio=${encodeURIComponent(word)}&type=${type}`;
  
  audio.oncanplay = () => {
    document.getElementById("status").innerText = "🔊 播放中...";
  };
  audio.onended = () => {
    document.getElementById("status").innerText = "";
  };
  audio.onerror = () => {
    if (type === 2) {
      tryOnlineTTS(word, 1); // 美式失败试英式
    } else {
      document.getElementById("status").innerText = "在线发音失败，尝试本地...";
      fallbackPlay();
    }
  };
  
  const p = audio.play();
  if (p !== undefined) {
    p.catch(() => fallbackPlay());
  }
}

function fallbackPlay() {
  if (!window.speechSynthesis) {
    document.getElementById("status").innerText = "❌ 无法播放发音";
    return;
  }
  window.speechSynthesis.cancel();
  
  const word = words[currentIndex].en;
  let u = new SpeechSynthesisUtterance(word);
  u.lang = 'en-US';
  u.rate = 0.9;
  u.pitch = 1;
  
  if (voices.length > 0) {
    const v = voices.find(x => x.lang && x.lang.startsWith('en'));
    if (v) u.voice = v;
  }
  
  u.onstart = () => document.getElementById("status").innerText = "🔊 本地朗读中...";
  u.onend = () => document.getElementById("status").innerText = "";
  u.onerror = () => document.getElementById("status").innerText = "朗读失败";
  
  window.speechSynthesis.speak(u);
}

// ==================== 按钮交互 ====================
function markFamiliar() {
  if (words.length === 0) {
    handleEmptyClick();
    return;
  }
  
  const word = words[currentIndex].en;
  const filter = getCurrentFilter();
  
  // 增加熟悉次数
  const countMap = getFamiliarCount();
  const newCount = (countMap[word] || 0) + 1;
  countMap[word] = newCount;
  saveFamiliarCount(countMap);
  
  if (newCount >= 2) {
    // 真正掌握
    const familiarList = getFamiliarWords();
    if (!familiarList.includes(word)) {
      familiarList.push(word);
      saveFamiliarWords(familiarList);
    }
    // 从不熟悉列表移除（如果存在）
    removeFromUnfamiliar(word);
    
    document.getElementById("status").innerText = `✓ 「${word}」已熟练掌握`;
    
    // 在未学习/不熟悉 模式下，掌握后从当前列表移除
    if (filter === 'unlearned' || filter === 'unfamiliar') {
      words.splice(currentIndex, 1);
      if (currentIndex >= words.length) currentIndex = 0;
    } else {
      currentIndex = (currentIndex + 1) % words.length;
    }
  } else {
    document.getElementById("status").innerText = `✓ 「${word}」熟悉进度 ${newCount}/2`;
    currentIndex = (currentIndex + 1) % words.length;
  }
  
  setTimeout(() => show(), 500);
}

function markUnfamiliar() {
  if (words.length === 0) {
    handleEmptyClick();
    return;
  }
  
  const word = words[currentIndex].en;
  const filter = getCurrentFilter();
  
  // 加入不熟悉列表
  const unfamiliarList = getUnfamiliarWords();
  if (!unfamiliarList.includes(word)) {
    unfamiliarList.push(word);
    saveUnfamiliarWords(unfamiliarList);
  }
  
  // 从掌握列表降级移除
  const familiarList = getFamiliarWords();
  const idx = familiarList.indexOf(word);
  if (idx > -1) {
    familiarList.splice(idx, 1);
    saveFamiliarWords(familiarList);
  }
  
  // 重置熟悉次数
  const countMap = getFamiliarCount();
  if (countMap[word]) {
    delete countMap[word];
    saveFamiliarCount(countMap);
  }
  
  document.getElementById("status").innerText = `✗ 「${word}」已标记为不熟悉`;
  
  // 在熟悉模式下，降级后从当前列表移除
  if (filter === 'familiar') {
    words.splice(currentIndex, 1);
    if (currentIndex >= words.length) currentIndex = 0;
  } else {
    currentIndex = (currentIndex + 1) % words.length;
  }
  
  setTimeout(() => show(), 500);
}

function next() {
  if (words.length === 0) {
    handleEmptyClick();
    return;
  }
  currentIndex = (currentIndex + 1) % words.length;
  show();
}

function removeFromUnfamiliar(word) {
  const list = getUnfamiliarWords();
  const idx = list.indexOf(word);
  if (idx > -1) {
    list.splice(idx, 1);
    saveUnfamiliarWords(list);
  }
}

function handleEmptyClick() {
  const filter = getCurrentFilter();
  if (filter === 'unlearned') {
    if (confirm("🎉 全部单词已掌握！是否重置所有进度？")) {
      resetAll();
    }
  }
}

function resetAll() {
  localStorage.removeItem(KEYS.FAMILIAR);
  localStorage.removeItem(KEYS.COUNT);
  localStorage.removeItem(KEYS.UNFAMILIAR);
  saveCurrentFilter('unlearned');
  document.getElementById('filterSelect').value = 'unlearned';
  initWords();
  show();
}

function changeFilter(value) {
  saveCurrentFilter(value);
  initWords();
  show();
}

// ==================== 启动 ====================
migrateOldData();
document.getElementById('filterSelect').value = getCurrentFilter();
if (initWords()) {
  show();
}
</script>
</body>
</html>
